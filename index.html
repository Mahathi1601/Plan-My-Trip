        :root {
            --bg-color: #F5F0E8;
            --card-bg: #FFFFFF;
            --primary: #B8D4E3;
            --primary-hover: #a3c5d8;
            --secondary: #D4E8D4;
            --accent: #F0D9E0;
            --text-main: #4A5568;
            --text-light: #718096;
            --border-color: #E8E0D5;
            --shadow: 0 8px 24px rgba(74, 85, 104, 0.08);
            --shadow-hover: 0 12px 32px rgba(74, 85, 104, 0.12);
            --radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        #root {
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        h1, h2, h3, h4 { color: var(--text-main); font-weight: 600; }
        h1 { font-size: 2.5rem; text-align: center; margin-bottom: 0.5rem; letter-spacing: -0.5px; }
        .subtitle { text-align: center; color: var(--text-light); margin-bottom: 3rem; font-size: 1.1rem; }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .input-group { display: flex; flex-direction: column; gap: 0.6rem; }
        label { font-weight: 500; font-size: 0.95rem; color: var(--text-main); }
        select, input {
            padding: 0.8rem 1.2rem;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background: var(--card-bg);
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%234A5568%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 1rem top 50%;
            background-size: 0.65rem auto;
        }
        select:focus, input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(184, 212, 227, 0.3); }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-main);
        }
        .btn-primary { 
            background: var(--primary); 
            width: 100%; 
            font-weight: 600; 
            padding: 1.2rem; 
            font-size: 1.1rem;
            color: #2D3748;
        }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(184, 212, 227, 0.4); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .btn-secondary { background: var(--card-bg); border: 2px solid var(--border-color); }
        .btn-secondary:hover { background: var(--bg-color); border-color: var(--text-light); }

        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 0;
            text-align: center;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid var(--accent);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.55, 0.15, 0.45, 0.85) infinite;
            margin-bottom: 1.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-size: 1.1rem; color: var(--text-light); font-weight: 500; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Itinerary Day Card */
        .day-card { padding: 0; overflow: hidden; }
        .day-header {
            background: var(--primary);
            color: #2D3748;
            padding: 1.2rem 2rem;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .day-body { padding: 2rem; }
        
        .time-block {
            margin-bottom: 2rem;
            padding-left: 1.5rem;
            border-left: 3px solid var(--secondary);
            position: relative;
        }
        .time-block::before {
            content: '';
            position: absolute;
            left: -8px;
            top: 5px;
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 3px solid var(--secondary);
        }
        .time-block.lunch::before, .time-block.dinner::before { border-color: var(--accent); }
        .time-block.lunch, .time-block.dinner { border-left-color: var(--accent); }
        
        .time-block h4 {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-main);
            margin-bottom: 0.4rem;
            font-size: 1.05rem;
        }
        .time-block p { color: var(--text-light); font-size: 0.95rem; margin-bottom: 0.5rem; }
        .time-block .highlight { color: var(--text-main); font-weight: 500; }
        
        .meta-info {
            display: flex;
            gap: 1.2rem;
            font-size: 0.85rem;
            color: var(--text-light);
            background: var(--bg-color);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            display: inline-flex;
        }
        
        .day-footer {
            background: var(--bg-color);
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95rem;
            border-top: 1px solid var(--border-color);
            color: var(--text-main);
            font-weight: 500;
        }

        /* Grid Layouts for Info Sections */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }
        .info-card h3 { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1.2rem; padding-bottom: 0.8rem; border-bottom: 2px solid var(--bg-color); }
        
        .list-item {
            display: flex;
            align-items: flex-start;
            gap: 0.8rem;
            margin-bottom: 0.8rem;
            color: var(--text-light);
            font-size: 0.95rem;
        }
        .list-item i { color: var(--text-main); margin-top: 0.25rem; font-size: 0.9rem; }

        .budget-row {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px dashed var(--border-color);
            color: var(--text-light);
        }
        .budget-row:last-child { border-bottom: none; }
        .budget-row.total {
            font-weight: 600;
            font-size: 1.2rem;
            margin-top: 0.5rem;
            color: var(--text-main);
            border-top: 2px solid var(--border-color);
            padding-top: 1rem;
        }

        /* Alerts */
        .alert {
            padding: 1rem 1.5rem;
            border-radius: 10px;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            font-weight: 500;
        }
        .alert-warning { background: #fdf6e3; color: #b58900; border: 1px solid #eee8d5; }
        .alert-info { background: var(--secondary); color: #2D3748; border: 1px solid #c3d9c3; }

        /* Actions Bar */
        .actions-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            justify-content: flex-end;
        }

        /* Results Container */
        .results-container {
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Print Styles */
        @media print {
            .no-print { display: none !important; }
            body { background: white; color: black; }
            #root { padding: 0; max-width: 100%; margin: 0; }
            .card { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; page-break-inside: avoid; margin-bottom: 1rem; padding: 1rem; }
            .day-header { background: #f0f0f0; border-bottom: 1px solid #ccc; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .time-block::before { border-color: #666; }
            .day-card { page-break-after: always; }
            .day-card:last-child { page-break-after: auto; }
        }
    </style>

            const city = name.split(',')[0].trim();

                return DESTINATION_SPECIFICS[city].mustVisit;

        const generateAttractions = (name) => {
            const city = name.split(',')[0].trim();
            const spec = DESTINATION_SPECIFICS[city];
            if(spec) {
                if (spec.attractions) return spec.attractions;
                if (spec.mustVisit) {
                    return spec.mustVisit.map(attrName => ({
                        name: attrName,
                        desc: "Explore " + attrName,
                        uniqueWhy: "A top-rated location in " + city,
                        bestTime: spec.bestTime ? (spec.bestTime[attrName] || "Anytime") : "Anytime",
                        insiderTip: "Plan ahead and enjoy your visit.",
                        duration: "2-3 hrs",
                        type: "outdoor",
                        cost: spec.costs ? (spec.costs[attrName] || 0) : 0
                    }));
                }
            }
            return [
                { name: "Local Market", desc: "Explore local handicrafts", uniqueWhy: "Feel the local vibe", bestTime: "Evening", type: "outdoor", cost: 0, duration: "2 hrs" },
                { name: "City Viewpoint", desc: "Panoramic views", uniqueWhy: "Great for photos", bestTime: "Morning", type: "outdoor", cost: 0, duration: "1 hr" },
                { name: "Heritage Museum", desc: "Learn local history", uniqueWhy: "Cultural deep dive", bestTime: "Afternoon", type: "indoor", cost: 100, duration: "2 hrs" },
                { name: "Main Plaza Walk", desc: "Heart of the city", uniqueWhy: "People watching", bestTime: "Evening", type: "outdoor", cost: 0, duration: "2 hrs" }
            ];
        };

        const getBestSeasons = (name) => {
            if(name.includes('Himachal') || name.includes('Uttarakhand') || name.includes('Sikkim') || name.includes('Kashmir')) return ["Summer", "Winter", "Peak Season"];
            if(name.includes('Rajasthan') || name.includes('Goa') || name.includes('Maharashtra') || name.includes('Kerala')) return ["Winter", "Peak Season"];
            if(name.includes('Meghalaya') || name.includes('Assam')) return ["Winter", "Summer"];
            return ["Summer", "Winter", "Peak Season", "Monsoon"];
        };

        // Build the database
        const destinationsDb = {};
        destinationsRaw.forEach(dest => {
            destinationsDb[dest] = {
                name: dest,
                bestSeasons: getBestSeasons(dest),
                food: getFoodForRegion(dest),
                attractions: generateAttractions(dest),
                mustVisit: getMustVisit(dest)
            };
        });

        // --- CONSTANTS & LOGIC ---
        const BUDGET_RATES = {
            "Economy": { hotel: 800, foodPerMeal: 150, transportPerDay: 200, activitiesMultiplier: 0.2 },
            "Mid-Range": { hotel: 3000, foodPerMeal: 400, transportPerDay: 800, activitiesMultiplier: 1.0 },
            "Luxury": { hotel: 10000, foodPerMeal: 1500, transportPerDay: 2500, activitiesMultiplier: 2.5 }
        };

        const SEASON_TIPS = {
            "Summer": { packing: "Light cottons, sunscreen, hat, sunglasses, comfortable walking shoes.", tip: "Start your day early to avoid afternoon heat. Stay hydrated." },
            "Monsoon": { packing: "Umbrella, raincoat, waterproof bag, synthetic quick-dry clothes, sturdy grip shoes.", tip: "Check local weather alerts. Stick to indoor activities during heavy downpours." },
            "Winter": { packing: "Heavy woolens, thermal innerwear, jacket, gloves, warm socks.", tip: "Days are short, plan major sightseeing before 4 PM. Enjoy local hot beverages." },
            "Peak Season": { packing: "Mix of comfortable clothes, nice evening wear, power bank.", tip: "Expect crowds everywhere. Pre-book your tickets and arrive early at attractions." }
        };

        // --- MAIN APP COMPONENT ---
        function App() {
            // Form State
            const [destination, setDestination] = useState("Manali, Himachal Pradesh");
            const [days, setDays] = useState(3);
            const [budget, setBudget] = useState("Mid-Range");
            const [season, setSeason] = useState("Winter");

            // App State
            const [isGenerating, setIsGenerating] = useState(false);
            const [itinerary, setItinerary] = useState(null);
            
            // Load history on mount
            useEffect(() => {
                const saved = localStorage.getItem('suhanaSafarHistory');
                if(saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        if(parsed.destination) {
                            setDestination(parsed.destination);
                            setDays(parsed.days);
                            setBudget(parsed.budget);
                            setSeason(parsed.season);
                            setItinerary(parsed.itinerary);
                        }
                    } catch(e) { console.error("Could not load history"); }
                }
            }, []);

            const generatePlan = () => {
                setIsGenerating(true);
                
                // Simulate AI processing delay
                setTimeout(() => {
                    const destData = destinationsDb[destination];
                    const bRates = BUDGET_RATES[budget];
                    const planDays = [];
                    
                    let totalHotel = 0;
                    let totalFood = 0;
                    let totalTransport = 0;
                    let totalActivities = 0;

                    // Filter attractions based on season (e.g. less outdoor in monsoon)
                    let availableAttractions = [...destData.attractions];
                    if (season === "Monsoon") {
                        // Prioritize indoor, mix some outdoor
                        availableAttractions.sort((a, b) => a.type === "indoor" ? -1 : 1);
                    } else if (season === "Summer") {
                        // Prioritize outdoor
                        availableAttractions.sort((a, b) => a.type === "outdoor" ? -1 : 1);
                    } else {
                        // Shuffle randomly for variety
                        availableAttractions.sort(() => 0.5 - Math.random());
                    }

                    let mornIndex = 0;
                    let aftIndex = 0;

                    const isMorning = (t) => t.toLowerCase().includes('morning') || t.toLowerCase().includes('mid-day') || t.toLowerCase().includes('anytime');
                    const isAfternoon = (t) => t.toLowerCase().includes('afternoon') || t.toLowerCase().includes('evening') || t.toLowerCase().includes('sunset') || t.toLowerCase().includes('anytime');
                    
                    let morningAttractions = availableAttractions.filter(a => isMorning(a.bestTime));
                    let afternoonAttractions = availableAttractions.filter(a => isAfternoon(a.bestTime));
                    
                    // Fallbacks to avoid empty lists
                    if (morningAttractions.length === 0) morningAttractions = availableAttractions;
                    if (afternoonAttractions.length === 0) afternoonAttractions = availableAttractions;

                    for(let i=1; i<=days; i++) {
                        const morningAttr = morningAttractions[mornIndex % morningAttractions.length];
                        mornIndex++;
                        const afternoonAttr = afternoonAttractions[aftIndex % afternoonAttractions.length];
                        aftIndex++;
                        const city = destData.name.split(',')[0];
                        const dayOfWeekMap = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
                        const startDayOfWeek = 1; // Assuming trip starts on Monday
                        const currentDayOfWeek = dayOfWeekMap[(startDayOfWeek + i - 1) % 7];
                        
                        let eveningAttr = { name: "Evening Plan", desc: "Explore the city", whyToday: "Great day for it", contingency: "Relax indoors", cost: 0, time: "2-3 hours" };
                        if(DESTINATION_SPECIFICS[city] && DESTINATION_SPECIFICS[city].evenings) {
                            eveningAttr = DESTINATION_SPECIFICS[city].evenings[(i - 1) % 7];
                            eveningAttr.cost = 0; // Evenings are experiential
                        }
                        
                        const dayCostObj = {
                            hotel: bRates.hotel,
                            food: bRates.foodPerMeal * 3,
                            transport: bRates.transportPerDay,
                            activities: Math.round((morningAttr.cost + afternoonAttr.cost + eveningAttr.cost) * bRates.activitiesMultiplier)
                        };

                        const dailyTotal = dayCostObj.hotel + dayCostObj.food + dayCostObj.transport + dayCostObj.activities;
                        
                        totalHotel += dayCostObj.hotel;
                        totalFood += dayCostObj.food;
                        totalTransport += dayCostObj.transport;
                        totalActivities += dayCostObj.activities;

                        // Budget specific restaurant recommendations
                        let restType = budget === "Economy" ? "Local Eatery / Street Food" : (budget === "Mid-Range" ? "Well-rated Local Restaurant" : "Premium Fine Dining / Hotel Restaurant");

                        planDays.push({
                            dayNum: i,
                            morning: morningAttr,
                            afternoon: afternoonAttr,
                            evening: eveningAttr,
                            restaurants: restType,
                            dailyTotal: dailyTotal
                        });
                    }

                    const result = {
                        destination: destData,
                        days: planDays,
                        budgetBreakdown: {
                            hotel: totalHotel,
                            food: totalFood,
                            transport: totalTransport,
                            activities: totalActivities,
                            total: totalHotel + totalFood + totalTransport + totalActivities
                        },
                        seasonDetails: SEASON_TIPS[season],
                        warnings: !destData.bestSeasons.includes(season) ? `Note: ${season} is generally considered off-season for ${destination}. Expect limited services or challenging weather.` : null
                    };

                    setItinerary(result);
                    setIsGenerating(false);

                    // Save to local storage
                    localStorage.setItem('suhanaSafarHistory', JSON.stringify({
                        destination, days, budget, season, itinerary: result
                    }));

                    // Scroll to results
                    setTimeout(() => {
                        document.getElementById('results-section').scrollIntoView({ behavior: 'smooth' });
                    }, 100);

                }, 1500);
            };

            const handlePrint = () => {
                window.print();
            };

            const handleShare = () => {
                alert("Itinerary copied to clipboard! (Simulated)");
            };

            return (
                <div className="app-wrapper">
                    <div className="no-print">
                        <h1><i className="fa-solid fa-map-location-dot" style={{color: "var(--primary)", marginRight: "10px"}}></i>Plan My Trip</h1>
                        <p className="subtitle">Why hire a guide? We've got you covered.</p>

                        <div className="card">
                            <div className="form-grid">
                                <div className="input-group">
                                    <label>Destination</label>
                                    <select value={destination} onChange={e => setDestination(e.target.value)}>
                                        {destinationsRaw.map(dest => (
                                            <option key={dest} value={dest}>{dest}</option>
                                        ))}
                                    </select>
                                </div>
                                
                                <div className="input-group">
                                    <label>Duration (Days)</label>
                                    <select value={days} onChange={e => setDays(Number(e.target.value))}>
                                        {[...Array(14).keys()].map(n => (
                                            <option key={n+1} value={n+1}>{n+1} {n===0?'Day':'Days'}</option>
                                        ))}
                                    </select>
                                </div>

                                <div className="input-group">
                                    <label>Budget Level</label>
                                    <select value={budget} onChange={e => setBudget(e.target.value)}>
                                        <option value="Economy">Economy (₹1-2k/day)</option>
                                        <option value="Mid-Range">Mid-Range (₹3-6k/day)</option>
                                        <option value="Luxury">Luxury (₹8k+/day)</option>
                                    </select>
                                </div>

                                <div className="input-group">
                                    <label>Travel Season</label>
                                    <select value={season} onChange={e => setSeason(e.target.value)}>
                                        <option value="Summer">Summer (Mar-Jun)</option>
                                        <option value="Monsoon">Monsoon (Jul-Sep)</option>
                                        <option value="Winter">Winter (Oct-Feb)</option>
                                        <option value="Peak Season">Peak Season (Dec-Jan)</option>
                                    </select>
                                </div>
                            </div>
                            
                            <button 
                                className="btn btn-primary" 
                                onClick={generatePlan}
                                disabled={isGenerating}
                            >
                                {isGenerating ? "Crafting your perfect trip..." : "Generate My Itinerary"}
                                {!isGenerating && <i className="fa-solid fa-wand-magic-sparkles"></i>}
                            </button>
                        </div>
                    </div>

                    {isGenerating && (
                        <div className="loader-container no-print">
                            <div className="spinner"></div>
                            <div className="loading-text">Analyzing routes & handpicking experiences...</div>
                        </div>
                    )}

                    {itinerary && !isGenerating && (
                        <div id="results-section" className="results-container">
                            
                            <div className="actions-bar no-print">
                                <button className="btn btn-secondary" onClick={handleShare}>
                                    <i className="fa-solid fa-share-nodes"></i> Share
                                </button>
                                <button className="btn btn-secondary" onClick={handlePrint}>
                                    <i className="fa-solid fa-print"></i> Save PDF / Print
                                </button>
                            </div>

                            {itinerary.warnings && (
                                <div className="alert alert-warning">
                                    <i className="fa-solid fa-triangle-exclamation"></i>
                                    {itinerary.warnings}
                                </div>
                            )}

                            {season === "Monsoon" && (
                                <div className="alert alert-info">
                                    <i className="fa-solid fa-cloud-rain"></i>
                                    Monsoon Travel: We've prioritized indoor activities and safe zones. Always check local weather forecasts before heading out.
                                </div>
                            )}

                            {/* Summary Cards Row */}
                            <div className="info-grid" style={{marginBottom: "2rem"}}>
                                <div className="card info-card">
                                    <h3><i className="fa-solid fa-wallet"></i> Estimated Budget</h3>
                                    <div className="budget-row">
                                        <span>Accommodation</span>
                                        <span>₹{itinerary.budgetBreakdown.hotel.toLocaleString()}</span>
                                    </div>
                                    <div className="budget-row">
                                        <span>Food & Dining</span>
                                        <span>₹{itinerary.budgetBreakdown.food.toLocaleString()}</span>
                                    </div>
                                    <div className="budget-row">
                                        <span>Local Transport</span>
                                        <span>₹{itinerary.budgetBreakdown.transport.toLocaleString()}</span>
                                    </div>
                                    <div className="budget-row">
                                        <span>Activities & Entry</span>
                                        <span>₹{itinerary.budgetBreakdown.activities.toLocaleString()}</span>
                                    </div>
                                    <div className="budget-row total">
                                        <span>Total Estimated</span>
                                        <span>₹{itinerary.budgetBreakdown.total.toLocaleString()}</span>
                                    </div>
                                    <p style={{fontSize: "0.8rem", color: "var(--text-light)", marginTop: "1rem", textAlign: "center"}}>
                                        *Excludes flights/trains to the destination
                                    </p>
                                </div>

                                <div className="card info-card">
                                    <h3><i className="fa-solid fa-suitcase"></i> Packing & Tips</h3>
                                    <div style={{marginBottom: "1rem"}}>
                                        <p style={{fontWeight: 500, color: "var(--text-main)"}}>Season: {season}</p>
                                        <p style={{fontSize: "0.95rem", color: "var(--text-light)"}}>{itinerary.seasonDetails.packing}</p>
                                    </div>
                                    <div>
                                        <p style={{fontWeight: 500, color: "var(--text-main)"}}>Pro Tip:</p>
                                        <p style={{fontSize: "0.95rem", color: "var(--text-light)"}}>{itinerary.seasonDetails.tip}</p>
                                    </div>
                                </div>

                                <div className="card info-card">
                                    <h3><i className="fa-solid fa-map-pin"></i> Top Must-Visit Places</h3>
                                    <ul style={{listStyle: "none", padding: 0}}>
                                        {itinerary.destination.mustVisit?.map((place, idx) => (
                                            <li key={idx} className="list-item" style={{marginBottom: "0.5rem"}}>
                                                <i className="fa-solid fa-location-dot" style={{color: "var(--primary)", marginTop: "4px"}}></i>
                                                <span style={{color: "var(--text-main)", fontWeight: "500"}}>{place}</span>
                                            </li>
                                        ))}
                                    </ul>
                                </div>

                                <div className="card info-card">
                                    <h3><i className="fa-solid fa-utensils"></i> Must-Try Local Cuisine</h3>
                                    <div style={{display: "flex", flexWrap: "wrap", gap: "0.5rem"}}>
                                        {itinerary.destination.food.map((dish, idx) => (
                                            <span key={idx} style={{
                                                background: "var(--bg-color)", 
                                                padding: "0.4rem 0.8rem", 
                                                borderRadius: "20px", 
                                                fontSize: "0.9rem",
                                                border: "1px solid var(--border-color)"
                                            }}>
                                                {dish}
                                            </span>
                                        ))}
                                    </div>
                                    <p style={{fontSize: "0.9rem", color: "var(--text-light)", marginTop: "1rem"}}>
                                        Ask your hotel or taxi driver for the most authentic places to try these!
                                    </p>
                                </div>
                            </div>

                            <h2 style={{marginBottom: "1.5rem", paddingBottom: "0.5rem", borderBottom: "2px solid var(--border-color)"}}>
                                Your {days}-Day Itinerary for {destination}
                            </h2>

                            {/* Itinerary Days */}
                            {itinerary.days.map((day, idx) => (
                                <div className="card day-card" key={idx}>
                                    <div className="day-header">
                                        <span>Day {day.dayNum} of {days}</span>
                                        <span style={{fontSize: "0.9rem", fontWeight: 500}}>
                                            {season} · {budget}
                                        </span>
                                    </div>
                                    
                                    <div className="day-body">
                                        {/* Morning */}
                                        <div className="time-block">
                                            <h4>🌅 MORNING <span style={{fontSize: "0.85rem", color: "var(--text-light)", fontWeight: "normal"}}>(8:00 AM - 12:00 PM)</span></h4>
                                            <p className="highlight">Visit {day.morning.name}</p>
                                            <p style={{fontSize: "0.95rem", color: "var(--text-light)"}}>{day.morning.desc}</p>
                                            
                                            <div className="insight-box" style={{backgroundColor: "rgba(0,0,0,0.02)", padding: "8px", borderRadius: "6px", margin: "8px 0", fontSize: "0.9rem"}}>
                                                <div style={{marginBottom: "4px"}}><i className="fa-solid fa-star" style={{color: "#fbbf24"}}></i> <strong>Why it's unique:</strong> {day.morning.uniqueWhy}</div>
                                                <div style={{marginBottom: "4px"}}><i className="fa-solid fa-clock" style={{color: "var(--primary)"}}></i> <strong>Best Time:</strong> {day.morning.bestTime}</div>
                                                <div><i className="fa-solid fa-lightbulb" style={{color: "var(--secondary)"}}></i> <strong>Insider Tip:</strong> {day.morning.insiderTip}</div>
                                            </div>

                                            <div className="meta-info" style={{marginTop: "8px"}}>
                                                <span><i className="fa-solid fa-stopwatch"></i> {day.morning.duration || day.morning.time}</span>
                                                <span><i className="fa-solid fa-ticket"></i> {day.morning.cost === 0 ? 'Free' : '₹' + day.morning.cost}</span>
                                            </div>
                                        </div>

                                        {/* Lunch */}
                                        <div className="time-block lunch">
                                            <h4>🍽️ LUNCH</h4>
                                            <p className="highlight">{day.restaurants}</p>
                                            <p>Try local specialty: {itinerary.destination.food[0]} or {itinerary.destination.food[1]}</p>
                                        </div>

                                        {/* Afternoon */}
                                        <div className="time-block">
                                            <h4>🌇 AFTERNOON <span style={{fontSize: "0.85rem", color: "var(--text-light)", fontWeight: "normal"}}>(1:00 PM - 5:00 PM)</span></h4>
                                            <p className="highlight">Explore {day.afternoon.name}</p>
                                            <p style={{fontSize: "0.95rem", color: "var(--text-light)"}}>{day.afternoon.desc}</p>
                                            
                                            <div className="insight-box" style={{backgroundColor: "rgba(0,0,0,0.02)", padding: "8px", borderRadius: "6px", margin: "8px 0", fontSize: "0.9rem"}}>
                                                <div style={{marginBottom: "4px"}}><i className="fa-solid fa-star" style={{color: "#fbbf24"}}></i> <strong>Why it's unique:</strong> {day.afternoon.uniqueWhy}</div>
                                                <div style={{marginBottom: "4px"}}><i className="fa-solid fa-clock" style={{color: "var(--primary)"}}></i> <strong>Best Time:</strong> {day.afternoon.bestTime}</div>
                                                <div><i className="fa-solid fa-lightbulb" style={{color: "var(--secondary)"}}></i> <strong>Insider Tip:</strong> {day.afternoon.insiderTip}</div>
                                            </div>

                                            <div className="meta-info" style={{marginTop: "8px"}}>
                                                <span><i className="fa-solid fa-stopwatch"></i> {day.afternoon.duration || day.afternoon.time}</span>
                                                <span><i className="fa-solid fa-ticket"></i> {day.afternoon.cost === 0 ? 'Free' : '₹' + day.afternoon.cost}</span>
                                            </div>
                                        </div>

                                        {/* Evening */}
                                        <div className="time-block evening" style={{backgroundColor: "rgba(99, 102, 241, 0.05)", borderLeftColor: "var(--primary)"}}>
                                            <h4>🌙 EVENING <span style={{fontSize: "0.85rem", color: "var(--text-light)", fontWeight: "normal"}}>(6:00 PM - 9:00 PM)</span></h4>
                                            <p className="highlight">{day.evening.name}</p>
                                            <p style={{fontSize: "0.95rem", color: "var(--text-light)", marginBottom: "10px"}}>{day.evening.desc}</p>
                                            
                                            <div className="insight-box" style={{backgroundColor: "rgba(255,255,255,0.7)", padding: "10px", borderRadius: "8px", border: "1px dashed var(--primary)", marginBottom: "10px"}}>
                                                <div style={{color: "var(--text-main)", marginBottom: "5px"}}>
                                                    <i className="fa-solid fa-calendar-day" style={{color: "var(--primary)"}}></i> <strong>Why Today?</strong> {day.evening.whyToday}
                                                </div>
                                                <div style={{color: "var(--text-light)", fontSize: "0.9rem"}}>
                                                    <i className="fa-solid fa-umbrella" style={{color: "var(--secondary)"}}></i> <strong>Contingency Plan:</strong> {day.evening.contingency}
                                                </div>
                                            </div>
                                            <div style={{fontSize: "0.85rem", color: "var(--success)", fontWeight: "500"}}>
                                                <i className="fa-solid fa-shield-check"></i> No local guide needed! We've verified this schedule.
                                            </div>
                                        </div>

                                        {/* Dinner */}
                                        <div className="time-block dinner" style={{marginBottom: 0, borderLeftColor: "transparent"}}>
                                            <h4>🍷 DINNER</h4>
                                            <p className="highlight">{day.restaurants}</p>
                                            <p>End your day with a hearty meal.</p>
                                        </div>
                                    </div>
                                    
                                    <div className="day-footer">
                                        <span>💰 Est. Daily Cost: ₹{day.dailyTotal.toLocaleString()}</span>
                                        <span style={{color: "var(--text-light)", fontSize: "0.85rem"}}>
                                            <i className="fa-solid fa-bed"></i> Stay included
                                        </span>
                                    </div>
                                </div>
                            ))}

                            <div className="card no-print" style={{textAlign: "center", background: "var(--secondary)", borderColor: "var(--secondary)"}}>
                                <h3>Ready to pack your bags? 🎒</h3>
                                <p style={{color: "var(--text-main)", marginBottom: "1rem"}}>Your perfect Indian getaway is just a booking away.</p>
                                <button className="btn btn-primary" style={{width: "auto"}} onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})}>
                                    Plan Another Trip
                                </button>
                            </div>

                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
